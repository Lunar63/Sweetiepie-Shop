<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweetiepie Shop - Watermark Design</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;700&family=Playfair+Display:ital,wght@1,500;1,600;1,700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .font-serif { font-family: 'Playfair Display', serif; }
        body { font-family: 'Kanit', sans-serif; overflow-x: hidden; background-color: #f0f9ff; margin: 0; }

        /* Keyframes Animations */
        @keyframes mesh-blob { 
            0% { transform: translate(0px, 0px) scale(1); } 
            33% { transform: translate(70px, -90px) scale(1.2); } 
            66% { transform: translate(-50px, 50px) scale(0.9); } 
            100% { transform: translate(0px, 0px) scale(1); } 
        }
        .animate-mesh-blob { animation: mesh-blob 18s ease-in-out infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        @keyframes heart-rise-slow { 
            0% { transform: translateY(30vh) scale(0.6); opacity: 0; } 
            20% { opacity: 0.9; } 
            80% { opacity: 0.9; } 
            100% { transform: translateY(-40vh) scale(1.4) rotate(20deg); opacity: 0; } 
        }
        .animate-heart-rise-slow { animation: heart-rise-slow 4s ease-out forwards; }

        @keyframes heart-burst-slow { 
            0% { transform: rotate(var(--angle)) translate(0); opacity: 1; } 
            100% { transform: rotate(var(--angle)) translate(var(--dist)); opacity: 0; } 
        }
        .animate-heart-burst-slow { animation: heart-burst-slow 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }

        @keyframes wiggle-tail { 
            0%, 100% { transform: rotate(-10deg); } 
            50% { transform: rotate(20deg); } 
        }
        .animate-wiggle-tail { animation: wiggle-tail 2s ease-in-out infinite; }

        @keyframes bounce-subtle { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-4px); } 
        }
        .animate-bounce-subtle { animation: bounce-subtle 0.6s ease-in-out infinite; }

        .backdrop-blur-xl { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- Custom SVG Icons (Replacing Lucide to fix errors) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                ShoppingBag: <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                X: <path d="M18 6 6 18"/><path d="m6 6 12 12"/>,
                Trash2: <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>,
                CheckCircle2: <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>,
                MessageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                Instagram: <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>,
                Clock: <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>,
                Mail: <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>,
                Cloud: <path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.47-1.594-4.566-3.805-5.298C18.662 4.417 15.34 2 11.5 2 7.763 2 4.604 4.195 4.101 7.214 2.33 8.163 1 10.128 1 12.5 1 15.537 3.463 18 6.5 18"/>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>,
                ArrowLeft: <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>,
                ImageIcon: <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>,
                Send: <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>,
                Plus: <path d="M12 5v14"/><path d="M5 12h14"/>,
                Info: <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>,
                ShieldAlert: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 8v4"/><path d="M12 16h.01"/>,
                FileText: <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/>,
                Facebook: <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>,
                Circle: <circle cx="12" cy="12" r="10"/>,
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- Heart Animation Component ---
        const PoppingHeart = ({ id, x, y, onComplete }) => {
            const [isBurst, setIsBurst] = useState(false);
            useEffect(() => {
                const burstTimer = setTimeout(() => setIsBurst(true), 3000); 
                const removeTimer = setTimeout(() => onComplete(id), 3800); 
                return () => { clearTimeout(burstTimer); clearTimeout(removeTimer); };
            }, [id, onComplete]);

            return (
                <div className="fixed pointer-events-none" style={{ left: `${x}%`, top: `${y}%`, zIndex: 40 }}>
                    {!isBurst ? (
                        <div className="animate-heart-rise-slow text-white drop-shadow-lg">
                            <Icon name="Heart" size={35} className="fill-white/40" />
                        </div>
                    ) : (
                        <div className="relative flex items-center justify-center">
                            {[...Array(8)].map((_, i) => (
                                <div key={i} className="absolute bg-white/60 rounded-full animate-heart-burst-slow"
                                    style={{ width: '6px', height: '6px', '--angle': `${i * 45}deg`, '--dist': '60px' }}
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const HeartSystem = () => {
            const [hearts, setHearts] = useState([]);
            const addHeart = useCallback(() => {
                const newHeart = { id: Math.random(), x: Math.random() * 95, y: Math.random() * 60 + 20 };
                setHearts(prev => [...prev.slice(-10), newHeart]);
            }, []);
            useEffect(() => {
                const interval = setInterval(addHeart, 2500);
                return () => clearInterval(interval);
            }, [addHeart]);
            return (
                <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                    {hearts.map(h => <PoppingHeart key={h.id} {...h} onComplete={(id) => setHearts(prev => prev.filter(item => item.id !== id))} />)}
                </div>
            );
        };

        // --- Background Component ---
        const DynamicBackground = () => (
            <div className="fixed inset-0 -z-10 overflow-hidden pointer-events-none bg-[#f8fdff]">
                <div className="absolute inset-0 bg-gradient-to-tr from-sky-200/50 via-white to-sky-100/50 opacity-100"></div>
                <div className="absolute top-[-15%] left-[-10%] w-[100vw] h-[100vw] bg-sky-300/30 rounded-full mix-blend-multiply filter blur-[120px] animate-mesh-blob"></div>
                <div className="absolute top-[20%] right-[-15%] w-[80vw] h-[80vw] bg-blue-200/40 rounded-full mix-blend-multiply filter blur-[100px] animate-mesh-blob animation-delay-2000"></div>
                <div className="absolute bottom-[-10%] left-[10%] w-[90vw] h-[90vw] bg-white rounded-full mix-blend-overlay filter blur-[110px] animate-mesh-blob animation-delay-4000"></div>
            </div>
        );

        // --- Cat Silhouette Component ---
        const CatShadowAnimation = () => {
            const [stage, setStage] = useState('sitting');
            const mountedRef = useRef(true);

            useEffect(() => {
                mountedRef.current = true;
                const cycle = async () => {
                    if (!mountedRef.current) return;
                    setStage('sitting'); await new Promise(r => setTimeout(r, 6000));
                    if (!mountedRef.current) return;
                    setStage('alert'); await new Promise(r => setTimeout(r, 1500));
                    if (!mountedRef.current) return;
                    setStage('running'); await new Promise(r => setTimeout(r, 4000));
                    if (!mountedRef.current) return;
                    setStage('hidden'); await new Promise(r => setTimeout(r, 5000));
                    if (!mountedRef.current) return;
                    cycle();
                };
                cycle();
                return () => { mountedRef.current = false; };
            }, []);

            return (
                <div className="absolute right-20 bottom-0 w-24 h-14 flex items-end justify-end pointer-events-none overflow-visible">
                    <div className={`absolute bottom-2 text-sky-400/80 transition-all duration-[6000ms] ease-linear
                        ${stage === 'sitting' ? 'right-[-150px] opacity-0' : 'right-[500px] opacity-100 rotate-[-1440deg]'}`}>
                        <Icon name="Circle" size={12} className="fill-current" />
                    </div>
                    <div className={`relative transition-all duration-[4000ms] ease-in-out flex flex-col items-center
                        ${stage === 'running' ? 'translate-x-[-450px] opacity-0' : 'translate-x-0 opacity-100'}`}>
                        {stage !== 'hidden' && ( stage === 'running' ? (
                            <svg width="48" height="40" viewBox="0 0 24 24" className="text-slate-700/20 fill-current animate-bounce-subtle transform scale-x-[-1]">
                                <path d="M2 14c0-1.1.9-2 2-2h12c1.7 0 3 .9 3 2.5V17c0 .6-.4 1-1 1s-1-.4-1-1v-1.5c0-.3-.2-.5-.5-.5h-1c-.3 0-.5.2-.5.5V18c0 .6-.4 1-1 1s-1-.4-1-1v-2h-2v2c0 .6-.4 1-1 1s-1-.4-1-1v-2H6v2c0 .6-.4 1-1 1s-1-.4-1-1v-4z" />
                                <circle cx="18" cy="11" r="3.5" />
                                <path d="M17 9l-1-2.5 2.5 1.5zM21 9l1-2.5-2.5 1.5z" />
                            </svg>
                        ) : (
                            <svg width="40" height="44" viewBox="0 0 24 24" className={`text-slate-700/20 fill-current transition-transform duration-700 ${stage === 'alert' ? 'scale-x-[-1]' : 'scale-x-1'}`}>
                                <path d="M16 20c0 1.1-.9 2-2 2H10c-1.1 0-2-.9-2-2v-4c0-2.2 1.8-4 4-4s4 1.8 4 4v4z" />
                                <g className={`transition-transform duration-300 ${stage === 'alert' ? '-translate-y-1 scale-110' : ''}`}>
                                    <circle cx="12" cy="8" r="5" />
                                    <path d="M8.5 5l-2.5-3.5 3.5 2.5z" /><path d="M15.5 5l2.5-3.5-3.5 2.5z" />
                                </g>
                                <g className="animate-wiggle-tail" style={{ transformOrigin: '14px 18px' }}>
                                    <path d="M14 18c2 2 4 1 4 4s-2 2-4 2" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" />
                                </g>
                            </svg>
                        ))}
                        <div className={`absolute -top-10 left-0 bg-sky-500 text-white text-[10px] px-3 py-1.5 rounded-full shadow-lg font-bold transition-all duration-500 transform
                            ${stage === 'alert' ? 'scale-100 opacity-100' : 'scale-0 opacity-0'}`}>อุ๊ย! อะไรนะคะ</div>
                    </div>
                </div>
            );
        };

        const PRODUCTS = [
            { id: 1, name: 'Ocean Breeze', price: 25, sub: 'สไตล์ซัมเมอร์สดใส พร้อมไอคอนใต้ท้องทะเล', details: 'รวบรวมความสดใสของทะเล ทั้งน้องแมงกะพรุน ปลาดาว และมะพร้าวหอม ๆ เหมาะสำหรับรีวิวสินค้าบิวตี้หรือท่องเที่ยว', image: 'ocean-breeze.png' },
            { id: 2, name: 'Minimal Orbit', price: 25, sub: 'ลายเส้นมินิมอลแบบอาร์ต ทันสมัย เรียบหรู', details: 'เน้นงานรูปทรงเรขาคณิตและดวงจันทร์ ให้ความรู้สึกพรีเมียม สวยเรียบแต่ดูมีอะไร น่าค้นหา', image: 'minimal-orbit.png' },
            { id: 3, name: 'Butterfly Dream', price: 25, sub: 'ความหวานละมุนของผีเสื้อและประกายดาว', details: 'ดีไซน์ที่เน้นความนุ่มฟูและจินตนาการ ด้วยเหล่าผีเสื้อโบยบิน เสริมความหวานให้แบรนด์ดูละมุน', image: 'butterfly-dream.png' },
            { id: 4, name: 'Oriental Zen', price: 25, sub: 'มนต์เสน่ห์แห่งตะวันออก สไตล์ญี่ปุ่น/จีน', details: 'งานประณีตที่มีทั้งนกกระเรียน ดอกซากุระ และโคมไฟ ให้ความรู้สึกมงคล คลาสสิก และทรงพลัง', image: 'oriental-zen.png' },
            { id: 5, name: 'Cyber HUD', price: 25, sub: 'ล้ำยุคด้วยสไตล์ Tech และ UI สุดโมเดิร์น', details: 'กรอบภาพสไตล์ Cyberpunk พร้อมกราฟเสียงและเส้นคลื่นดิจิทัล สำหรับงานที่ต้องการความล้ำสมัย โดดเด่น', image: 'cyber-hud.png' }
        ];

        // --- Main App Component ---
        function App() {
            const [view, setView] = useState('home');
            const [cart, setCart] = useState([]);
            const [modalProduct, setModalProduct] = useState(null);
            const [toast, setToast] = useState(null);

            const addToCart = (product) => {
                if (cart.find(p => p.id === product.id)) {
                    setToast("เพิ่มสินค้านี้ในตะกร้าแล้วนะคะ ✨");
                } else {
                    setCart([...cart, product]);
                    setToast("เพิ่มลงตะกร้าเรียบร้อยแล้วค่ะ ☁️");
                }
                setTimeout(() => setToast(null), 3000);
                setModalProduct(null);
            };

            const removeFromCart = (id) => { setCart(cart.filter(p => p.id !== id)); };
            const totalPrice = cart.reduce((acc, curr) => acc + curr.price, 0);

            return (
                <div className="relative min-h-screen selection:bg-sky-200">
                    <DynamicBackground />
                    <HeartSystem />
                    
                    {/* Navbar */}
                    <nav className="fixed top-0 w-full bg-white/40 backdrop-blur-xl z-50 border-b border-white/40 h-20 shadow-sm px-6">
                        <div className="max-w-6xl mx-auto h-full flex items-center justify-between relative">
                            <div className="flex items-center space-x-2 cursor-pointer group" onClick={() => setView('home')}>
                                <div className="bg-white/80 p-2 rounded-xl shadow-md text-sky-500 group-hover:scale-110 transition-transform">
                                    <Icon name="Cloud" size={24} />
                                </div>
                                <h1 className="text-xl font-medium tracking-tight text-slate-800">Sweetiepie <span className="font-serif italic text-sky-500">Shop</span></h1>
                            </div>
                            <div className="flex items-center space-x-6 relative">
                                <CatShadowAnimation />
                                <button onClick={() => setView('cart')} className="relative p-3 hover:bg-white/60 rounded-full transition-all text-slate-700 hover:text-sky-600 z-10">
                                    <Icon name="ShoppingBag" size={24} />
                                    {cart.length > 0 && <span className="absolute top-1 right-1 bg-sky-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-white animate-bounce shadow-sm">{cart.length}</span>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto relative pt-32 pb-20 px-4">
                        {view === 'home' ? (
                            <div className="space-y-32">
                                <section className="max-w-4xl mx-auto text-center">
                                    <div className="inline-flex items-center space-x-2 px-6 py-2 bg-white/60 backdrop-blur-md rounded-full text-[12px] uppercase tracking-[0.2em] mb-10 text-sky-700 font-bold border border-white/50 shadow-sm">
                                        <Icon name="Sparkles" size={14} className="mr-1" /><span>Ready-made & Custom Design</span>
                                    </div>
                                    <h2 className="text-6xl md:text-8xl font-light mb-10 tracking-tighter text-slate-900 drop-shadow-md text-center">Sweetiepie <span className="italic font-serif text-sky-500/80">Shop</span></h2>
                                    <p className="text-slate-700 max-w-3xl mx-auto mb-14 leading-relaxed font-light text-xl text-balance text-center">ประทับความเป็นเจ้าของผลงานของคุณให้ดูละมุนและมีเอกลักษณ์เฉพาะตัว <br/> ด้วยลายน้ำที่มีให้เลือกทั้งแบบ <span className="text-sky-600 font-medium italic">สำเร็จรูป</span> และ <span className="text-sky-600 font-medium italic">งานออกแบบใหม่</span> ค่ะ 💙</p>
                                    <div className="flex justify-center">
                                        <a href="https://lin.ee/7Bga3bbv" target="_blank" className="bg-sky-500 text-white px-12 py-5 rounded-full text-lg font-bold hover:bg-sky-600 transition-all shadow-xl active:scale-95 inline-flex items-center space-x-2">
                                            <Icon name="MessageSquare" size={20} /><span>ติดต่อสอบถาม</span>
                                        </a>
                                    </div>
                                </section>

                                <section id="shop" className="max-w-6xl mx-auto pt-20 relative z-10">
                                    <div className="text-center mb-16">
                                        <h3 className="text-3xl font-light mb-4 text-slate-800 tracking-tight text-center">Watermark Styles</h3>
                                        <p className="text-sky-600 font-serif italic text-lg text-center">เลือกสไตล์ที่ใช่ แบบที่ชอบได้เลย</p>
                                        <div className="w-12 h-1 bg-sky-400/40 mx-auto mt-4 rounded-full text-center"></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                        {PRODUCTS.map(p => (
                                            <div key={p.id} className="group bg-white/60 backdrop-blur-md rounded-[3rem] p-8 shadow-sm hover:shadow-2xl hover:bg-white/90 transition-all border border-white/60 flex flex-col">
                                                <div className="bg-white/40 aspect-square rounded-[2.5rem] mb-8 flex items-center justify-center relative overflow-hidden group-hover:scale-95 transition-transform border border-sky-50/50 shadow-inner">
                                                    <img src={p.image} alt={p.name} className="absolute inset-0 w-full h-full object-cover opacity-60" onError={(e) => { e.target.style.display = 'none'; }} />
                                                    <span className="text-sky-400/30 font-serif italic text-2xl -rotate-12 select-none tracking-widest font-bold uppercase text-center relative z-10">Sample Design</span>
                                                    <div className="absolute inset-0 bg-sky-400/5 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all z-20">
                                                        <button onClick={() => setModalProduct(p)} className="bg-white/95 text-sky-600 px-6 py-3 rounded-full text-xs font-bold shadow-md hover:bg-sky-50">ดูรายละเอียด</button>
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-center mb-3"><h4 className="text-xl font-medium text-slate-800">{p.name}</h4><span className="text-sky-600 font-serif text-2xl font-bold">฿{p.price}</span></div>
                                                <p className="text-slate-600 text-sm mb-8 font-light flex-grow text-left">{p.sub}</p>
                                                <button onClick={() => addToCart(p)} className="w-full py-4 rounded-2xl bg-sky-500 text-white font-bold hover:bg-sky-600 transition-all shadow-lg active:scale-95">หยิบลงตะกร้าค่ะ</button>
                                            </div>
                                        ))}
                                        <div className="bg-white/20 backdrop-blur-sm rounded-[3rem] p-8 border-2 border-dashed border-white/40 flex flex-col items-center justify-center text-center opacity-60 min-h-[400px]">
                                            <div className="bg-white/80 p-6 rounded-full shadow-sm text-sky-300 transition-transform hover:scale-110 cursor-pointer">
                                                <Icon name="Plus" size={32} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-24 text-center">
                                        <button className="inline-flex items-center space-x-2 text-sky-600 font-medium hover:text-sky-800 group transition-all mx-auto">
                                            <span className="border-b-2 border-transparent group-hover:border-sky-600 pb-1 text-2xl font-bold">ดูเพิ่มเติม</span>
                                            <Icon name="ChevronRight" size={28} className="group-hover:translate-x-2 transition-transform" />
                                        </button>
                                    </div>
                                </section>
